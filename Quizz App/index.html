<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizz App</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    
    <section class="container">
        <div class="cards">
            <div class="quiz-screen">
                <p id="questionCount">Question 1 of 5</p>
                <h2 id="questionText">What is the capital of France?</h2>
                <button class="option">London</button>
                <button class="option">Paris</button>
                <button class="option">Berlin</button>
                <button class="option">Madrid</button>
                <button id="nextBtn">Next...</button>
            </div>
            <div class="result-screen">
                <h1>Quiz Completed</h1>
                <p id="scoreText">Your Score: 4/5</p>
                <button id="restartBtn">Restart Quiz</button>
            </div>
            
        </div>
    </section>

</body>
</html>
