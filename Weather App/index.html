<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    
    <section class="container">
        <div class="card">
            <h1>Weather App</h1>
            <div class="searchBar">
                <input type="search" id="cityInput" placeholder="Enter City Name...">
                <button class="searchBtn">Search</button>
            </div>
            <h2 id="cityName">Karachi</h2>
            <img id="weatherIcon" src="" alt="weather icon">
            <h1 id="temperature">32 <sup>0</sup>C</h1>
            <p id="condition">Partly Cloudy</p>
            <div class="moreInformation">
                <p id="humidity">Humidity: 70%</p>
                <p id="wind">Wind: 12 km/h</p>
                <p id="visibility">Visibility: 8 km</p>
            </div>
        </div>
    </section>

</body>
</html>
